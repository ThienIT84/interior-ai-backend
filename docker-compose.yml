services:
  redis:
    image: redis:latest
    ports:
      - "127.0.0.1:6380:6379" # Host backend connects via localhost:6380, avoid conflict with local Redis
    volumes:
      - redis_data:/data # Persistence: Restart máy không mất Job

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

volumes:
  redis_data: