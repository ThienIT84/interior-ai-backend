services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379" # Allow backend running on host to connect via localhost:6379
    volumes:
      - redis_data:/data # Persistence: Restart máy không mất Job

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0

volumes:
  redis_data: